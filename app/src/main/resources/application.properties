server.port=8080

bot.token=${BOT_TOKEN}
bot.username=${BOT_USERNAME}

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.generate-ddl=false

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS}

spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.multiplier=1.5
spring.rabbitmq.template.retry.max-interval=10000

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=1.5
spring.rabbitmq.listener.simple.retry.max-interval=10000

ai.api.url=${AI_API_URL}
ai.api.key=${AI_API_KEY}
ai.model=${AI_MODEL}
ai.max.tokens=${AI_MAX_TOKENS:500}
ai.temperature=${AI_TEMPERATURE:0.7}

app.features.reset-command.enabled=true
app.features.task-reset-button.enabled=true